name: Deploy Site

on:
  push:
    branches: [main]
    paths:
      - 'apps/site/**'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-central-1
  S3_BUCKET: ellevas.dev-site-assets
  DISTRIBUTION_ID: EPPOCV96KGDK7

jobs:
  deploy:
    name: Build & Deploy to S3 + CloudFront
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        working-directory: apps/site

      - name: Build site
        run: bun run build
        working-directory: apps/site

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::583359355881:role/ellevas-site-github-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync hashed assets (immutable, 1 year)
        run: |
          aws s3 sync apps/site/dist s3://${{ env.S3_BUCKET }} \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*" --include "_astro/*"

      - name: Sync static assets without hashed names (1 week)
        run: |
          aws s3 sync apps/site/dist s3://${{ env.S3_BUCKET }} \
            --cache-control "public, max-age=604800" \
            --exclude "*" --include "fonts/*" --include "icons/*" \
            --include "favicon.ico" --include "favicon.svg"

      - name: Sync HTML and other pages (always revalidate)
        run: |
          aws s3 sync apps/site/dist s3://${{ env.S3_BUCKET }} \
            --delete \
            --cache-control "public, max-age=0, must-revalidate" \
            --exclude "_astro/*" --exclude "fonts/*" --exclude "icons/*" \
            --exclude "favicon.ico" --exclude "favicon.svg"

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id ${{ env.DISTRIBUTION_ID }} --paths "/*"
